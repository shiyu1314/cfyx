name: Filter JP SG IPs 

on:
  workflow_dispatch:  # 手动触发
  schedule:
    - cron: '0 1 * * *'  # 每天时间9点运行

jobs:
  filter-ips:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # 增加超时时间

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Install jq for JSON parsing
      run: |
        sudo apt-get update
        sudo apt-get install -y jq

    - name: Fetch IP list
      run: |
        curl -s "https://zip.cm.edu.kg/all.txt" -o raw_ips.txt
        echo "Total IPs fetched: $(wc -l < raw_ips.txt)"

    - name: Filter SG/JP IPs with port 443 only
      run: |
        # 分别获取JP和SG的IP
        grep -E "(JP)" raw_ips.txt | grep ":443#" | sed 's/:443#.*//' > jp_ips.txt
        grep -E "(SG)" raw_ips.txt | grep ":443#" | sed 's/:443#.*//' > sg_ips.txt
        
        echo "JP IPs found: $(wc -l < jp_ips.txt)"
        echo "SG IPs found: $(wc -l < sg_ips.txt)"
        
        # 如果IP太多，只取前100个测试
        head -100 jp_ips.txt > jp_ips_limited.txt
        head -100 sg_ips.txt > sg_ips_limited.txt
        mv jp_ips_limited.txt jp_ips.txt
        mv sg_ips_limited.txt sg_ips.txt
        echo "Limited to first 100 IPs per country for testing"

    - name: Check IPs with external API and select fastest
      run: |
        # 初始化最快IP数组
        fastest_jp_ips=()
        fastest_jp_times=()
        
        # 检查JP IPs
        if [ -s jp_ips.txt ]; then
          jp_total=$(wc -l < jp_ips.txt)
          jp_count=0
          
          while IFS= read -r ip; do
            jp_count=$((jp_count + 1))
            echo "[JP $jp_count/$jp_total] Testing $ip..."
            
            # 设置更短的超时时间
            response=$(timeout 5s curl -s "https://ip.kkki.qzz.io/check?proxyip=$ip" 2>/dev/null || echo "timeout")
            
            if [ "$response" != "timeout" ]; then
              if echo "$response" | jq -e '.success == true' >/dev/null 2>&1; then
                response_time=$(echo "$response" | jq -r '.responseTime' | grep -Eo '[0-9]+' || echo "9999")
                echo "  ✓ Valid JP IP, response time: ${response_time}ms"
                
                # 如果数组未满5个，直接添加
                if [ ${#fastest_jp_ips[@]} -lt 5 ]; then
                  fastest_jp_ips+=("$ip")
                  fastest_jp_times+=("$response_time")
                  echo "  Added to JP list (${#fastest_jp_ips[@]}/5)"
                else
                  # 找到当前数组中最慢的IP
                  max_time=0
                  max_index=0
                  for i in "${!fastest_jp_times[@]}"; do
                    if [ "${fastest_jp_times[$i]}" -gt "$max_time" ]; then
                      max_time="${fastest_jp_times[$i]}"
                      max_index=$i
                    fi
                  done
                  
                  # 如果当前IP比最慢的IP快，替换它
                  if [ "$response_time" -lt "$max_time" ]; then
                    fastest_jp_ips[$max_index]="$ip"
                    fastest_jp_times[$max_index]="$response_time"
                    echo "  Replaced slower JP IP (${max_time}ms -> ${response_time}ms)"
                  fi
                fi
              else
                echo "  ✗ JP IP discarded (success not true)"
              fi
            else
              echo "  ✗ JP IP discarded (timeout)"
            fi
            
            # 每5个请求休息一下，避免速率限制
            if [ $((jp_count % 5)) -eq 0 ]; then
              sleep 0.5
            fi
            
          done < jp_ips.txt
        fi
        
        # 初始化最快SG IP数组
        fastest_sg_ips=()
        fastest_sg_times=()
        
        # 检查SG IPs
        if [ -s sg_ips.txt ]; then
          sg_total=$(wc -l < sg_ips.txt)
          sg_count=0
          
          while IFS= read -r ip; do
            sg_count=$((sg_count + 1))
            echo "[SG $sg_count/$sg_total] Testing $ip..."
            
            # 设置更短的超时时间
            response=$(timeout 5s curl -s "https://ip.kkki.qzz.io/check?proxyip=$ip" 2>/dev/null || echo "timeout")
            
            if [ "$response" != "timeout" ]; then
              if echo "$response" | jq -e '.success == true' >/dev/null 2>&1; then
                response_time=$(echo "$response" | jq -r '.responseTime' | grep -Eo '[0-9]+' || echo "9999")
                echo "  ✓ Valid SG IP, response time: ${response_time}ms"
                
                # 如果数组未满5个，直接添加
                if [ ${#fastest_sg_ips[@]} -lt 5 ]; then
                  fastest_sg_ips+=("$ip")
                  fastest_sg_times+=("$response_time")
                  echo "  Added to SG list (${#fastest_sg_ips[@]}/5)"
                else
                  # 找到当前数组中最慢的IP
                  max_time=0
                  max_index=0
                  for i in "${!fastest_sg_times[@]}"; do
                    if [ "${fastest_sg_times[$i]}" -gt "$max_time" ]; then
                      max_time="${fastest_sg_times[$i]}"
                      max_index=$i
                    fi
                  done
                  
                  # 如果当前IP比最慢的IP快，替换它
                  if [ "$response_time" -lt "$max_time" ]; then
                    fastest_sg_ips[$max_index]="$ip"
                    fastest_sg_times[$max_index]="$response_time"
                    echo "  Replaced slower SG IP (${max_time}ms -> ${response_time}ms)"
                  fi
                fi
              else
                echo "  ✗ SG IP discarded (success not true)"
              fi
            else
              echo "  ✗ SG IP discarded (timeout)"
            fi
            
            # 每5个请求休息一下，避免速率限制
            if [ $((sg_count % 5)) -eq 0 ]; then
              sleep 0.5
            fi
            
          done < sg_ips.txt
        fi
        
        # 保存最快的JP IPs
        > valid_jp_ips.txt
        for ip in "${fastest_jp_ips[@]}"; do
          echo "$ip" >> valid_jp_ips.txt
        done
        
        # 保存最快的SG IPs
        > valid_sg_ips.txt
        for ip in "${fastest_sg_ips[@]}"; do
          echo "$ip" >> valid_sg_ips.txt
        done
        
        # 合并结果，确保总共10个IP
        cat valid_jp_ips.txt valid_sg_ips.txt | head -10 > filtered_ips.txt
        
        echo "Final fastest IPs selected:"
        echo "JP IPs (response times): ${fastest_jp_times[@]}"
        echo "SG IPs (response times): ${fastest_sg_times[@]}"
        cat filtered_ips.txt
        echo -e "\nFinal IP count: $(wc -l < filtered_ips.txt)"

    - name: Display filtered IPs
      run: |
        echo "Filtered IP addresses (443 port only, fastest):"
        cat filtered_ips.txt
        echo -e "\nTotal IPs: $(wc -l < filtered_ips.txt)"
        echo "JP IPs: $(grep -c . valid_jp_ips.txt 2>/dev/null || echo 0)"
        echo "SG IPs: $(grep -c . valid_sg_ips.txt 2>/dev/null || echo 0)"

    - name: Commit and push if changed
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        
        if [ -n "$(git status --porcelain filtered_ips.txt)" ]; then
          git add filtered_ips.txt
          git commit -m "Update filtered JP/SG IP list (10 fastest IPs) $(date '+%Y-%m-%d %H:%M:%S')"
          git push origin HEAD:${{ github.ref_name }}
          echo "Changes committed and pushed"
        else
          echo "No changes to commit"
        fi