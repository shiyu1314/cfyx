name: Filter JP SG IPs 

on:
  workflow_dispatch:  # 手动触发
  schedule:
    - cron: '0 1 * * *'  # 每天时间9点运行

jobs:
  filter-ips:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Install jq for JSON parsing
      run: |
        sudo apt-get update
        sudo apt-get install -y jq

    - name: Fetch IP list
      run: |
        curl -s "https://zip.cm.edu.kg/all.txt" -o raw_ips.txt

    - name: Filter SG/JP IPs with port 443 only
      run: |
        # 分别获取JP和SG的IP
        grep -E "(JP)" raw_ips.txt | grep ":443#" | sed 's/:443#.*//' > jp_ips.txt
        grep -E "(SG)" raw_ips.txt | grep ":443#" | sed 's/:443#.*//' > sg_ips.txt
        
        echo "JP IPs found: $(wc -l < jp_ips.txt)"
        echo "SG IPs found: $(wc -l < sg_ips.txt)"

    - name: Check IPs with external API and select fastest
      run: |
        # 检查JP IPs - 收集所有有效的并选择最快的5个
        touch jp_results.txt
        if [ -s jp_ips.txt ]; then
          jp_total=$(wc -l < jp_ips.txt)
          jp_count=0
          
          while IFS= read -r ip; do
            jp_count=$((jp_count + 1))
            echo "[JP $jp_count/$jp_total] Testing $ip..."
            
            response=$(curl -s --max-time 10 "https://ip.kkki.qzz.io/check?proxyip=$ip" 2>/dev/null)
            curl_exit_code=$?
            
            if [ $curl_exit_code -eq 0 ]; then
              if echo "$response" | jq -e '.success == true' >/dev/null 2>&1; then
                response_time=$(echo "$response" | jq -r '.responseTime // empty' | grep -Eo '[0-9]+' || echo "9999")
                echo "  ✓ Valid JP IP, response time: ${response_time}ms"
                echo "$ip $response_time" >> jp_results.txt
              else
                echo "  ✗ JP IP discarded (success not true)"
              fi
            else
              echo "  ✗ JP IP discarded (curl failed: $curl_exit_code)"
            fi
            
            if [ $((jp_count % 20)) -eq 0 ]; then
              sleep 1
            fi
            
          done < jp_ips.txt
        fi
        
        # 检查SG IPs - 收集所有有效的并选择最快的5个
        touch sg_results.txt
        if [ -s sg_ips.txt ]; then
          sg_total=$(wc -l < sg_ips.txt)
          sg_count=0
          
          while IFS= read -r ip; do
            sg_count=$((sg_count + 1))
            echo "[SG $sg_count/$sg_total] Testing $ip..."
            
            response=$(curl -s --max-time 10 "https://ip.kkki.qzz.io/check?proxyip=$ip" 2>/dev/null)
            curl_exit_code=$?
            
            if [ $curl_exit_code -eq 0 ]; then
              if echo "$response" | jq -e '.success == true' >/dev/null 2>&1; then
                response_time=$(echo "$response" | jq -r '.responseTime // empty' | grep -Eo '[0-9]+' || echo "9999")
                echo "  ✓ Valid SG IP, response time: ${response_time}ms"
                echo "$ip $response_time" >> sg_results.txt
              else
                echo "  ✗ SG IP discarded (success not true)"
              fi
            else
              echo "  ✗ SG IP discarded (curl failed: $curl_exit_code)"
            fi
            
            if [ $((sg_count % 20)) -eq 0 ]; then
              sleep 1
            fi
            
          done < sg_ips.txt
        fi
        
        # 选择最快的JP IPs (最多5个)
        touch valid_jp_ips.txt
        if [ -s jp_results.txt ]; then
          sort -n -k2 jp_results.txt | head -5 | cut -d' ' -f1 > valid_jp_ips.txt
          echo "Fastest JP IPs selected:"
          sort -n -k2 jp_results.txt | head -5
        fi
        
        # 选择最快的SG IPs (最多5个)
        touch valid_sg_ips.txt
        if [ -s sg_results.txt ]; then
          sort -n -k2 sg_results.txt | head -5 | cut -d' ' -f1 > valid_sg_ips.txt
          echo "Fastest SG IPs selected:"
          sort -n -k2 sg_results.txt | head -5
        fi
        
        # 合并结果，确保总共10个IP
        cat valid_jp_ips.txt valid_sg_ips.txt | head -10 > filtered_ips.txt
        
        echo "Final fastest IPs selected:"
        cat filtered_ips.txt
        echo -e "\nFinal IP count: $(wc -l < filtered_ips.txt)"

    - name: Display filtered IPs
      run: |
        echo "Filtered IP addresses (443 port only, fastest first):"
        cat filtered_ips.txt
        echo -e "\nTotal IPs: $(wc -l < filtered_ips.txt)"
        echo "JP IPs: $(grep -c . valid_jp_ips.txt 2>/dev/null || echo 0)"
        echo "SG IPs: $(grep -c . valid_sg_ips.txt 2>/dev/null || echo 0)"

    - name: Commit and push if changed
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        
        if [ -n "$(git status --porcelain filtered_ips.txt)" ]; then
          git add filtered_ips.txt
          git commit -m "Update filtered JP/SG IP list (10 fastest IPs) $(date '+%Y-%m-%d %H:%M:%S')"
          git push origin HEAD:${{ github.ref_name }}
          echo "Changes committed and pushed"
        else
          echo "No changes to commit"
        fi